<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Finanças Pessoais</title>
<meta name="description" content="Controle financeiro pessoal — salários, dívidas, cartões, investimentos">
<meta name="theme-color" content="#1b4332">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e5df;
    --border2: #d0cdc5;
    --text: #1e1e1e;
    --muted: #8a8478;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --danger: #b94040;
    --danger-light: #fdecea;
    --warn: #a05c1a;
    --warn-light: #fff3e0;
    --info: #1a5276;
    --info-light: #eaf4fd;
    --purple: #5b3fa6;
    --purple-light: #ede9fc;
    --font: 'Lora', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
    --r: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; }

  .cover { width:100%; height:120px; background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 55%,#40916c 100%); position:relative; overflow:hidden; }
  .cover::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.015) 20px,rgba(255,255,255,.015) 40px); }

  .wrapper { max-width:960px; margin:0 auto; padding:0 44px 100px; }

  .page-header { padding:0 0 24px; border-bottom:1.5px solid var(--border2); margin-bottom:24px; }
  .page-emoji { font-size:3rem; display:block; margin-top:-20px; margin-bottom:8px; cursor:pointer; user-select:none; }
  .page-title { font-size:2rem; font-weight:700; letter-spacing:-.02em; border:none; background:transparent; width:100%; font-family:var(--font); color:var(--text); outline:none; cursor:text; padding:2px 4px; border-radius:4px; }
  .page-title:hover, .page-title:focus { background:rgba(0,0,0,.03); }
  .page-sub { font-size:.88rem; color:var(--muted); font-style:italic; border:none; background:transparent; width:100%; font-family:var(--font); outline:none; margin-top:4px; cursor:text; padding:2px 4px; }

  /* MONTH NAV */
  .month-nav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .month-tab { font-family:var(--mono); font-size:.72rem; padding:5px 14px; border-radius:20px; border:1px solid var(--border2); background:var(--surface); color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .month-tab:hover { border-color:var(--accent); color:var(--accent); }
  .month-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* CHIPS */
  .chips { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; }
  .chip { flex:1; min-width:130px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:13px 15px; }
  .chip-label { font-family:var(--mono); font-size:.63rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px; }
  .chip-value { font-family:var(--mono); font-size:1.15rem; font-weight:500; }
  .cv-green { color:var(--accent); }
  .cv-red { color:var(--danger); }
  .cv-purple { color:var(--purple); }

  /* SECTION */
  h2.sec { font-size:.95rem; font-weight:700; display:flex; align-items:center; gap:8px; margin:32px 0 10px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .sbadge { font-family:var(--mono); font-size:.63rem; font-weight:500; padding:2px 8px; border-radius:20px; margin-left:auto; }
  .sb-green { background:var(--accent-light); color:var(--accent); }
  .sb-red { background:var(--danger-light); color:var(--danger); }
  .sb-yellow { background:var(--warn-light); color:var(--warn); }
  .sb-purple { background:var(--purple-light); color:var(--purple); }
  .sb-blue { background:var(--info-light); color:var(--info); }

  h3.subsec { font-family:var(--mono); font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin:18px 0 8px; display:flex; align-items:center; gap:8px; }

  /* TABLE */
  .tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:4px; overflow-x:auto; }
  table.nt { width:100%; border-collapse:collapse; font-size:.86rem; min-width:500px; }
  table.nt thead th { background:#f3f1eb; padding:8px 12px; text-align:left; font-family:var(--mono); font-size:.62rem; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; }
  table.nt td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
  table.nt tr:last-child td { border-bottom:none; }
  table.nt tr:hover td { background:#faf9f6; }

  [contenteditable=true] { outline:none; cursor:text; min-width:40px; display:inline-block; }
  [contenteditable=true]:focus { background:#fffde7; border-radius:3px; box-shadow:inset 0 0 0 1.5px #f5d060; }

  .mono { font-family:var(--mono); font-size:.8rem; }
  .green { color:var(--accent); }
  .red { color:var(--danger); }
  .gray { color:var(--muted); }

  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-family:var(--mono); font-size:.67rem; font-weight:500; white-space:nowrap; }
  .tag-green { background:var(--accent-light); color:var(--accent); }
  .tag-red { background:var(--danger-light); color:var(--danger); }
  .tag-yellow { background:var(--warn-light); color:var(--warn); }
  .tag-purple { background:var(--purple-light); color:var(--purple); }
  .tag-blue { background:var(--info-light); color:var(--info); }
  .tag-gray { background:#f0ede7; color:var(--muted); }
  .tag-fin { background:#e8f0fe; color:#1a56db; font-size:.63rem; letter-spacing:.02em; }

  .isel { background:transparent; border:none; font-family:var(--mono); font-size:.76rem; color:var(--text); cursor:pointer; outline:none; padding:2px 4px; border-radius:3px; }
  .isel:focus { background:#fffde7; }
  .isel.tag { padding:3px 8px; }

  .del-btn { background:none; border:none; color:#ccc; cursor:pointer; font-size:.95rem; padding:1px 5px; border-radius:4px; transition:all .15s; }
  .del-btn:hover { color:var(--danger); background:var(--danger-light); }

  .add-btn { display:flex; align-items:center; gap:6px; padding:7px 10px; font-size:.76rem; font-family:var(--mono); color:var(--muted); background:none; border:none; cursor:pointer; border-radius:5px; transition:all .15s; margin-bottom:2px; }
  .add-btn:hover { background:var(--surface); color:var(--text); }

  /* ghost row = parcela propagada (não editável aqui) */
  tr.ghost td { opacity:.6; font-style:italic; }
  tr.ghost td[contenteditable] { pointer-events:none; background:none !important; box-shadow:none !important; }

  /* PROGRESS */
  .pbar { height:5px; background:var(--border); border-radius:99px; overflow:hidden; margin-top:6px; }
  .pbar-fill { height:100%; border-radius:99px; transition:width .4s; }

  /* PERIOD */
  .period-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .period-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; }
  .pc-title { font-family:var(--mono); font-size:.64rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:8px; }
  .pc-amount { font-family:var(--mono); font-size:1.1rem; font-weight:500; }

  /* INVEST */
  .invest-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:8px; }
  .invest-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
  .ic-pct { font-family:var(--mono); font-size:1.7rem; font-weight:500; margin-bottom:3px; }
  .ic-label { font-size:.8rem; font-weight:700; margin-bottom:3px; }
  .ic-desc { font-size:.75rem; color:var(--muted); font-style:italic; line-height:1.4; margin-bottom:10px; }
  .ic-value { font-family:var(--mono); font-size:1rem; font-weight:500; }
  .ic-bar { height:4px; background:var(--border); border-radius:99px; margin-top:8px; overflow:hidden; }
  .ic-bar-fill { height:100%; border-radius:99px; }

  /* CALLOUT */
  .callout { display:flex; gap:10px; background:var(--info-light); border:1px solid #b8d8f0; border-radius:var(--r); padding:11px 14px; font-size:.84rem; color:var(--info); margin-bottom:14px; }

  /* FLOATING BAR */
  .fbar { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#1c1c1c; border-radius:12px; padding:8px 14px; display:flex; align-items:center; gap:4px; box-shadow:0 6px 28px rgba(0,0,0,.22); z-index:999; }
  .fb-btn { background:none; border:none; color:#bbb; font-size:.73rem; font-family:var(--mono); padding:6px 10px; border-radius:6px; cursor:pointer; white-space:nowrap; transition:all .15s; }
  .fb-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
  .fb-sep { width:1px; height:18px; background:#333; margin:0 2px; }
  .fb-saved { color:#52c77a; font-size:.68rem; font-family:var(--mono); opacity:0; transition:opacity .3s; pointer-events:none; }
  .fb-saved.show { opacity:1; }

  /* ADD MONTH */
  .add-month-row { display:flex; gap:8px; align-items:center; margin-top:4px; }
  .nm-input { font-family:var(--mono); font-size:.76rem; padding:5px 10px; border:1px solid var(--border2); border-radius:6px; background:var(--surface); color:var(--text); outline:none; display:none; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(3px); z-index:1000; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:460px; max-width:95vw; padding:28px; animation:mIn .2s ease; }
  @keyframes mIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  .modal h3 { font-size:1rem; font-weight:700; margin-bottom:20px; }
  .frow { margin-bottom:14px; }
  .flabel { display:block; font-family:var(--mono); font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; }
  .finput { width:100%; background:#f7f6f3; border:1px solid var(--border2); color:var(--text); font-family:var(--mono); font-size:.86rem; padding:9px 12px; border-radius:6px; outline:none; }
  .finput:focus { border-color:var(--accent); background:#fff; }
  .frow2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
  .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; border-radius:7px; font-family:var(--font); font-size:.82rem; font-weight:700; cursor:pointer; border:none; transition:all .15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#235c42; }
  .btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text); }
  .btn-outline:hover { background:var(--bg); }

  .divider { height:1px; background:var(--border); margin:28px 0; }
  .footer-note { text-align:center; font-family:var(--mono); font-size:.68rem; color:var(--muted); }

  /* DAILY MOVEMENTS */
  .daily-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .daily-col-title { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .daily-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:.86rem; }
  .daily-item:last-child { border-bottom:none; }
  .daily-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .daily-dot.in  { background:var(--accent); }
  .daily-dot.out { background:var(--danger); }
  .daily-desc { flex:1; }
  .daily-dia  { font-family:var(--mono); font-size:.72rem; color:var(--muted); min-width:32px; }
  .daily-val  { font-family:var(--mono); font-size:.82rem; font-weight:500; white-space:nowrap; }
  .daily-total-row { display:flex; justify-content:space-between; align-items:center; padding-top:10px; margin-top:6px; border-top:1.5px solid var(--border2); font-family:var(--mono); font-size:.82rem; }

  /* INVESTMENT TRACKER */
  .inv-tracker { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .inv-main-card { background:var(--surface); border:1.5px solid var(--accent); border-radius:var(--r); padding:20px; }
  .inv-main-label { font-family:var(--mono); font-size:.63rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  .inv-main-value { font-family:var(--mono); font-size:2rem; font-weight:500; color:var(--accent); line-height:1; margin-bottom:4px; }
  .inv-main-sub { font-size:.78rem; color:var(--muted); font-style:italic; }
  .inv-proj-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; }
  .inv-proj-title { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .inv-proj-row { display:flex; justify-content:space-between; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--border); }
  .inv-proj-row:last-child { border-bottom:none; }
  .inv-proj-period { font-size:.82rem; color:var(--text); }
  .inv-proj-val { font-family:var(--mono); font-size:.88rem; font-weight:500; color:var(--accent); }
  .inv-proj-gain { font-family:var(--mono); font-size:.72rem; color:var(--muted); }
  .inv-add-row { display:flex; gap:8px; margin-top:12px; align-items:center; }
  .inv-input { font-family:var(--mono); font-size:.82rem; padding:7px 10px; border:1px solid var(--border2); border-radius:6px; background:var(--bg); color:var(--text); outline:none; width:130px; }
  .inv-input:focus { border-color:var(--accent); background:#fff; }
  .inv-input-desc { flex:1; }
  .inv-history { margin-top:14px; }
  .inv-hist-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:.83rem; }
  .inv-hist-item:last-child { border-bottom:none; }
  .inv-hist-desc { flex:1; }
  .inv-hist-val { font-family:var(--mono); font-size:.8rem; color:var(--accent); font-weight:500; }
  .inv-hist-date { font-family:var(--mono); font-size:.7rem; color:var(--muted); }
  .cdi-note { font-family:var(--mono); font-size:.68rem; color:var(--muted); margin-top:10px; font-style:italic; }

  @media(max-width:660px) {
    .wrapper { padding:0 16px 90px; }
    .invest-grid,.period-grid { grid-template-columns:1fr; }
    .chips { flex-direction:column; }
  }
</style>
</head>
<body>

<div class="cover"></div>

<div class="wrapper">

  <!-- HEADER -->
  <div class="page-header">
    <span class="page-emoji" id="pageEmoji" onclick="cycleEmoji()">💰</span>
    <div class="page-title" contenteditable="true" id="pageTitle" spellcheck="false">Finanças Pessoais</div>
    <div class="page-sub" contenteditable="true" id="pageSub" spellcheck="false">Meu controle financeiro mensal · clique em qualquer campo para editar</div>
  </div>

  <!-- MONTH TABS -->
  <div class="month-nav" id="monthNav"></div>
  <div class="add-month-row">
    <button class="add-btn" onclick="openAddMonth()">＋ Novo mês</button>
    <input class="nm-input" id="nmInput" placeholder="Ex: Maio 2026" onkeydown="nmKey(event)" />
    <button class="add-btn" id="nmConfirm" style="display:none" onclick="confirmAddMonth()">✓ Adicionar</button>
  </div>

  <!-- MONTH CONTENT -->
  <div id="monthContent"></div>

</div>

<!-- FLOATING BAR -->
<div class="fbar">
  <button class="fb-btn" onclick="openSalarioModal()">＋ Salário</button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="openDivFixaModal()">＋ Dívida fixa</button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="openCartaoModal()">＋ Cartão</button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="openMovModal('out')">＋ Gasto diário</button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="openMovModal('in')">＋ Recebimento extra</button>
  <div class="fb-sep"></div>
  <button class="fb-btn" onclick="saveAll()">💾 Salvar</button>
  <div class="fb-sep"></div>
  <span class="fb-saved" id="savedMsg">✓ salvo</span>
</div>

<!-- MODAL SALÁRIO -->
<div class="modal-overlay" id="mSalario">
  <div class="modal">
    <h3>Adicionar Salário</h3>
    <div class="frow"><label class="flabel">Descrição</label><input class="finput" id="ms-desc" placeholder="Ex: Salário CLT, Freelance..." /></div>
    <div class="frow2">
      <div class="frow"><label class="flabel">Valor (R$)</label><input class="finput" id="ms-valor" type="number" step="0.01" placeholder="0,00" /></div>
      <div class="frow"><label class="flabel">Dia recebido</label><input class="finput" id="ms-dia" type="number" min="1" max="31" placeholder="5" /></div>
    </div>
    <div class="frow"><label class="flabel">Observação</label><input class="finput" id="ms-obs" placeholder="Opcional..." /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('mSalario')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveSalario()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DÍVIDA FIXA -->
<div class="modal-overlay" id="mDivFixa">
  <div class="modal">
    <h3>Adicionar Dívida Fixa</h3>
    <div class="frow"><label class="flabel">Descrição</label><input class="finput" id="mdf-desc" placeholder="Ex: Aluguel, Financiamento..." /></div>
    <div class="frow2">
      <div class="frow"><label class="flabel">Valor (R$)</label><input class="finput" id="mdf-valor" type="number" step="0.01" placeholder="0,00" /></div>
      <div class="frow"><label class="flabel">Dia vencimento</label><input class="finput" id="mdf-dia" type="number" min="1" max="31" placeholder="10" /></div>
    </div>
    <div class="frow">
      <label class="flabel">Categoria</label>
      <select class="finput" id="mdf-cat">
        <option>Moradia</option><option>Alimentação</option><option>Saúde</option>
        <option>Educação</option><option>Transporte</option><option>Assinatura</option>
        <option>Financiamento</option><option>Outros</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('mDivFixa')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDivFixa()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CARTÃO -->
<div class="modal-overlay" id="mCartao">
  <div class="modal">
    <h3>Adicionar item no Cartão</h3>
    <div class="frow"><label class="flabel">Descrição</label><input class="finput" id="mc-desc" placeholder="Ex: TV Samsung, Curso online..." /></div>
    <div class="frow2">
      <div class="frow"><label class="flabel">Valor da parcela (R$)</label><input class="finput" id="mc-valor" type="number" step="0.01" placeholder="0,00" /></div>
      <div class="frow">
        <label class="flabel">Nº de parcelas</label>
        <select class="finput" id="mc-parcelas">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
          <option>11</option><option>12</option><option>18</option><option>24</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <label class="flabel">Cartão (dia de vencimento)</label>
      <select class="finput" id="mc-cartao">
        <option value="d08">Cartão dia 08</option>
        <option value="d15">Cartão dia 15</option>
        <option value="d23">Cartão dia 23</option>
        <option value="d25">Cartão dia 25</option>
      </select>
    </div>
    <div class="frow"><label class="flabel">Mês inicial (Ex: Abril 2026)</label><input class="finput" id="mc-mesInicio" placeholder="Abril 2026" /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('mCartao')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCartao()">Salvar e propagar</button>
    </div>
  </div>
</div>

<!-- MODAL MOVIMENTO DIÁRIO -->
<div class="modal-overlay" id="mMov">
  <div class="modal">
    <h3 id="mMov-title">Registrar Gasto do Dia</h3>
    <div class="frow"><label class="flabel">Descrição</label><input class="finput" id="mMov-desc" placeholder="Ex: Café, Uber, Farmácia..." /></div>
    <div class="frow2">
      <div class="frow"><label class="flabel">Valor (R$)</label><input class="finput" id="mMov-valor" type="number" step="0.01" placeholder="0,00" /></div>
      <div class="frow"><label class="flabel">Dia</label><input class="finput" id="mMov-dia" type="number" min="1" max="31" placeholder="09" /></div>
    </div>
    <input type="hidden" id="mMov-tipo" value="out" />
    <div class="modal-actions">

<script>
// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const EMOJIS = ['💰','💵','📊','🏦','🌿','⭐','🎯','🔑','✨','💎','🌱','📈'];
let emojiIdx = 0;

function cycleEmoji() {
  emojiIdx = (emojiIdx+1) % EMOJIS.length;
  document.getElementById('pageEmoji').textContent = EMOJIS[emojiIdx];
  state.emoji = EMOJIS[emojiIdx];
}

function parseVal(txt) {
  return parseFloat(String(txt||'').replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'')) || 0;
}
function fmtBRL(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function setEl(id, val) { const e=document.getElementById(id); if(e) e.textContent=val; }

// Month order helpers
function monthIndex(label) {
  const [nome, ano] = label.split(' ');
  return parseInt(ano)*100 + MONTH_NAMES.indexOf(nome);
}
function addMonths(label, n) {
  const [nome, ano] = label.split(' ');
  let mi = MONTH_NAMES.indexOf(nome);
  let y = parseInt(ano);
  mi += n;
  while(mi >= 12) { mi -= 12; y++; }
  while(mi < 0)   { mi += 12; y--; }
  return MONTH_NAMES[mi] + ' ' + y;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  months: ['Abril 2026','Março 2026','Fevereiro 2026','Janeiro 2026'],
  activeMonth: 'Abril 2026',
  pageTitle: 'Finanças Pessoais',
  pageSub: 'Meu controle financeiro mensal · clique em qualquer campo para editar',
  emoji: '💰',
  // salarios[month] = [{id,desc,valor,dia,obs}]
  salarios: {},
  // dividasFixas[month] = [{id,desc,valor,dia,cat,status}]
  dividasFixas: {},
  // installments = [{id, desc, valorParcela, totalParcelas, cartao, mesInicio}]
  // status[month][itemId] = 'pendente'|'pago'|'atrasado'
  installments: [],
  statusMap: {},
  // movimentos[month] = [{id, tipo:'in'|'out', desc, valor, dia}]
  movimentos: {},
  // aportes = [{id, desc, valor, dia, mes}]  — acumulado global
  aportes: []
};

function getSalarios(m) { if(!state.salarios[m]) state.salarios[m]=[]; return state.salarios[m]; }
function getDivFixas(m) { if(!state.dividasFixas[m]) state.dividasFixas[m]=[]; return state.dividasFixas[m]; }
function getMovimentos(m) { if(!state.movimentos[m]) state.movimentos[m]=[]; return state.movimentos[m]; }

// Get installments active in a given month
function getInstallmentsForMonth(m) {
  return state.installments.filter(it => {
    const start = monthIndex(it.mesInicio);
    const end   = monthIndex(addMonths(it.mesInicio, it.totalParcelas - 1));
    const cur   = monthIndex(m);
    return cur >= start && cur <= end;
  }).map(it => {
    const cur = monthIndex(m);
    const start = monthIndex(it.mesInicio);
    const parcelaAtual = cur - start + 1;
    const mesFinalizacao = addMonths(it.mesInicio, it.totalParcelas - 1);
    return { ...it, parcelaAtual, mesFinalizacao };
  });
}

function getStatus(month, id) {
  if(!state.statusMap[month]) state.statusMap[month]={};
  return state.statusMap[month][id] || 'pendente';
}
function setStatus(month, id, val) {
  if(!state.statusMap[month]) state.statusMap[month]={};
  state.statusMap[month][id] = val;
}

// ═══════════════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════════════
function saveAll() {
  readDOMIntoState();
  localStorage.setItem('fintrack_v5', JSON.stringify(state));
  const el = document.getElementById('savedMsg');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

function loadState() {
  const raw = localStorage.getItem('fintrack_v5');
  if(raw) { try { state = JSON.parse(raw); } catch(e){} }
}

setInterval(saveAll, 40000);

function readDOMIntoState() {
  state.pageTitle = document.getElementById('pageTitle')?.innerText || state.pageTitle;
  state.pageSub   = document.getElementById('pageSub')?.innerText   || state.pageSub;

  const m = state.activeMonth;

  // Salários
  state.salarios[m] = [];
  document.querySelectorAll('#tbl-sal tbody tr').forEach(tr => {
    const c = tr.querySelectorAll('[contenteditable]');
    if(c.length>=4) state.salarios[m].push({
      id: tr.dataset.id||uid(),
      desc: c[0].innerText, valor: c[1].innerText,
      dia: c[2].innerText, obs: c[3].innerText
    });
  });

  // Dívidas fixas
  state.dividasFixas[m] = [];
  document.querySelectorAll('#tbl-dfix tbody tr').forEach(tr => {
    const c = tr.querySelectorAll('[contenteditable]');
    const sels = tr.querySelectorAll('select');
    if(c.length>=3) state.dividasFixas[m].push({
      id: tr.dataset.id||uid(),
      desc: c[0].innerText, valor: c[1].innerText,
      dia: c[2].innerText,
      cat: sels[0]?.value||'Outros',
      status: sels[1]?.value||'pendente'
    });
  });

  // Status of installments (read from selects in cartão tables)
  ['d08','d15','d23','d25'].forEach(key => {
    document.querySelectorAll(`#tbl-${key} tbody tr`).forEach(tr => {
      const id = tr.dataset.id;
      const sel = tr.querySelector('select.status-sel');
      if(id && sel) setStatus(m, id, sel.value);
    });
  });
  // movimentos são gerenciados direto no state, não precisam ler DOM
}

// ═══════════════════════════════════════════════
// MONTH NAV
// ═══════════════════════════════════════════════
function renderMonthNav() {
  document.getElementById('monthNav').innerHTML = state.months.map(m =>
    `<div class="month-tab ${m===state.activeMonth?'active':''}" onclick="switchMonth('${m}')">${m}</div>`
  ).join('');
}

function switchMonth(m) {
  readDOMIntoState();
  state.activeMonth = m;
  renderMonthNav();
  renderMonthContent(m);
}

function openAddMonth() {
  const inp = document.getElementById('nmInput');
  const btn = document.getElementById('nmConfirm');
  inp.style.display = inp.style.display==='none'?'block':'none';
  btn.style.display = btn.style.display==='none'?'block':'none';
  if(inp.style.display==='block') { inp.value = ''; inp.focus(); }
}
function nmKey(e) { if(e.key==='Enter') confirmAddMonth(); }
function confirmAddMonth() {
  const val = document.getElementById('nmInput').value.trim();
  if(!val) return;
  if(!state.months.includes(val)) {
    // Insert sorted by month index descending
    state.months.push(val);
    state.months.sort((a,b) => monthIndex(b) - monthIndex(a));
  }
  document.getElementById('nmInput').style.display='none';
  document.getElementById('nmConfirm').style.display='none';
  switchMonth(val);
}

// ═══════════════════════════════════════════════
// RENDER MONTH

  const el = document.getElementById('monthContent');

function cartaoBlock(m, key, label) {
  const items = getInstallmentsForMonth(m).filter(it => it.cartao === key);
  const rows = items.map(it => rowCartao(m, it)).join('');
  return `
    <h3 class="subsec">💳 ${label} <span class="tag tag-red" id="b-${key}" style="font-size:.63rem">R$ 0,00</span></h3>
    <div class="tbl-wrap">

        <th>Descrição</th><th>Valor Parcela</th><th>Parcela</th><th>Data Finalização</th><th>Status</th><th style="width:30px"></th>
      </tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <button class="add-btn" onclick="openCartaoModal('${key}')">＋ Adicionar item</button>`;
}

// ═══════════════════════════════════════════════
// ROW BUILDERS
// ═══════════════════════════════════════════════
function rowSal(s) {
  return `<tr data-id="${s.id||uid()}">
    <td contenteditable="true" oninput="calcAll()">${s.desc}</td>
    <td contenteditable="true" class="mono green" oninput="calcAll()">${s.valor}</td>
    <td contenteditable="true" class="mono gray" oninput="calcAll()">${s.dia}</td>
    <td contenteditable="true" class="gray" style="font-size:.8rem" oninput="calcAll()">${s.obs||''}</td>
    <td><button class="del-btn" onclick="delSalRow(this)">×</button></td>
  </tr>`;
}

function rowDfix(d) {
  const cats = ['Moradia','Alimentação','Saúde','Educação','Transporte','Assinatura','Financiamento','Outros'];
  const catOpts = cats.map(c=>`<option${c===d.cat?' selected':''}>${c}</option>`).join('');
  const stOpts = ['pendente','pago','atrasado'].map(s=>`<option${s===d.status?' selected':''}>${s}</option>`).join('');
  const stCls = d.status==='pago'?'tag-green':d.status==='atrasado'?'tag-red':'tag-yellow';
  return `<tr data-id="${d.id||uid()}">
    <td contenteditable="true" oninput="calcAll()">${d.desc}</td>
    <td contenteditable="true" class="mono red" oninput="calcAll()">${d.valor}</td>
    <td contenteditable="true" class="mono gray" oninput="calcAll()">${d.dia}</td>
    <td><select class="isel" onchange="calcAll()">${catOpts}</select></td>
    <td><select class="isel tag ${stCls}" onchange="updateStTag(this)">${stOpts}</select></td>
    <td><button class="del-btn" onclick="delDfixRow(this)">×</button></td>
  </tr>`;
}

function rowCartao(m, it) {
  const status = getStatus(m, it.id);
  const stOpts = ['pendente','pago','atrasado'].map(s=>`<option${s===status?' selected':''}>${s}</option>`).join('');
  const stCls = status==='pago'?'tag-green':status==='atrasado'?'tag-red':'tag-yellow';
  const isLast = it.parcelaAtual === it.totalParcelas;
  const finCls = isLast ? 'tag-purple' : 'tag-blue';
  return `<tr data-id="${it.id}">
    <td>${it.desc}</td>
    <td class="mono red">${fmtBRL(it.valorParcela)}</td>
    <td><span class="tag tag-gray">${it.parcelaAtual}/${it.totalParcelas}</span></td>
    <td><span class="tag ${finCls}">${it.mesFinalizacao}${isLast?' ★':''}</span></td>
    <td><select class="isel tag ${stCls} status-sel" onchange="updateStTag(this);saveStatus(this,'${m}','${it.id}')">${stOpts}</select></td>
    <td><button class="del-btn" title="Remover de todos os meses" onclick="delInstallment('${it.id}')">×</button></td>
  </tr>`;
}

function updateStTag(sel) {
  sel.className = 'isel tag status-sel ' + (sel.value==='pago'?'tag-green':sel.value==='atrasado'?'tag-red':'tag-yellow');
}

function saveStatus(sel, m, id) {
  setStatus(m, id, sel.value);
}

// ═══════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════
function delSalRow(btn) { btn.closest('tr').remove(); calcAll(); }
function delDfixRow(btn) { btn.closest('tr').remove(); calcAll(); }

function delInstallment(id) {
  if(!confirm('Remover este item de TODOS os meses?')) return;
  state.installments = state.installments.filter(it => it.id !== id);
  renderMonthContent(state.activeMonth);
}

// ═══════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════
function sumTableCol(tableId, colIdx) {
  let t = 0;
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(tr => {
    const cells = tr.querySelectorAll('[contenteditable]');
    if(cells[colIdx]) t += parseVal(cells[colIdx].innerText);
  });
  return t;
}

function calcAll() {
  const m = state.activeMonth;

  const receita = sumTableCol('tbl-sal', 1);
  const divFix  = sumTableCol('tbl-dfix', 1);

  const c08 = getInstallmentsForMonth(m).filter(i=>i.cartao==='d08').reduce((s,i)=>s+i.valorParcela,0);
  const c15 = getInstallmentsForMonth(m).filter(i=>i.cartao==='d15').reduce((s,i)=>s+i.valorParcela,0);
  const c23 = getInstallmentsForMonth(m).filter(i=>i.cartao==='d23').reduce((s,i)=>s+i.valorParcela,0);
  const c25 = getInstallmentsForMonth(m).filter(i=>i.cartao==='d25').reduce((s,i)=>s+i.valorParcela,0);
  const totalCart = c08+c15+c23+c25;
  const totalDiv  = divFix + totalCart;

  // Movimentos diários
  const movs = getMovimentos(m);
  const movIn  = movs.filter(x=>x.tipo==='in').reduce((s,x)=>s+x.valor,0);
  const movOut = movs.filter(x=>x.tipo==='out').reduce((s,x)=>s+x.valor,0);
  const movLiq = movIn - movOut;

  const saldo = receita - totalDiv + movLiq;
  const pct   = receita>0 ? Math.min(100, Math.round(totalDiv/receita*100)) : 0;

  setEl('c-rec', fmtBRL(receita));
  setEl('c-div', fmtBRL(totalDiv));
  const cs = document.getElementById('c-sal');
  if(cs){ cs.textContent=fmtBRL(saldo); cs.className='chip-value '+(saldo>=0?'cv-green':'cv-red'); }
  setEl('c-pct', pct+'%');

  setEl('b-sal', fmtBRL(receita));
  setEl('b-dfix', fmtBRL(divFix));
  setEl('b-cart', fmtBRL(totalCart));
  setEl('b-d08', fmtBRL(c08));
  setEl('b-d15', fmtBRL(c15));
  setEl('b-d23', fmtBRL(c23));
  setEl('b-d25', fmtBRL(c25));

  // Movimentos badges
  setEl('b-mov-in',  '+'+fmtBRL(movIn));
  setEl('b-mov-out', '−'+fmtBRL(movOut));
  const liqEl = document.getElementById('b-mov-liq');
  if(liqEl){ liqEl.textContent='líquido '+(movLiq>=0?'+':'')+fmtBRL(movLiq); liqEl.className='sbadge '+(movLiq>=0?'sb-green':'sb-red'); }
  setEl('daily-out-total', fmtBRL(movOut));
  setEl('daily-in-total',  fmtBRL(movIn));

  // Período: dívidas fixas + c08 + c15 vencem até dia 15
  const d0115 = divFix + c08 + c15;
  const d1530 = c23 + c25;
  setEl('p-total', fmtBRL(totalDiv));
  setEl('p-0115', fmtBRL(d0115));
  setEl('p-1530', fmtBRL(d1530));
  const p01 = document.getElementById('pb-0115');
  const p15 = document.getElementById('pb-1530');
  if(totalDiv>0){
    if(p01) p01.style.width = Math.round(d0115/totalDiv*100)+'%';
    if(p15) p15.style.width = Math.round(d1530/totalDiv*100)+'%';
  }

  // 50/30/20
  setEl('inv-50', fmtBRL(receita*0.5));
  setEl('inv-30', fmtBRL(receita*0.3));
  setEl('inv-20', fmtBRL(receita*0.2));
}

// ═══════════════════════════════════════════════
// DAILY MOVEMENTS
// ═══════════════════════════════════════════════
function openMovModal(tipo) {
  document.getElementById('mMov-tipo').value = tipo;
  document.getElementById('mMov-title').textContent = tipo==='out' ? 'Registrar Gasto do Dia' : 'Registrar Recebimento Extra';
  const hoje = new Date().getDate();
  document.getElementById('mMov-dia').value = hoje;
  document.getElementById('mMov-desc').value = '';
  document.getElementById('mMov-valor').value = '';
  openModal('mMov');
  document.getElementById('mMov-desc').focus();
}

function saveMov() {
  const tipo  = document.getElementById('mMov-tipo').value;
  const desc  = document.getElementById('mMov-desc').value.trim();
  const valor = parseFloat(document.getElementById('mMov-valor').value) || 0;
  const dia   = document.getElementById('mMov-dia').value || new Date().getDate();
  if(!desc || !valor) return alert('Preencha descrição e valor.');
  const m = state.activeMonth;
  getMovimentos(m).push({ id:uid(), tipo, desc, valor, dia: String(dia) });
  closeModal('mMov');
  renderMovimentos(m);
  calcAll();
}

function delMov(id) {
  const m = state.activeMonth;
  state.movimentos[m] = (state.movimentos[m]||[]).filter(x=>x.id!==id);
  renderMovimentos(m);
  calcAll();
}

function renderMovimentos(m) {
  const movs = getMovimentos(m);
  const outs = movs.filter(x=>x.tipo==='out').sort((a,b)=>parseInt(a.dia)-parseInt(b.dia));
  const ins  = movs.filter(x=>x.tipo==='in').sort((a,b)=>parseInt(a.dia)-parseInt(b.dia));

  const outEl = document.getElementById('daily-out-list');
  const inEl  = document.getElementById('daily-in-list');
  if(!outEl) return;

  outEl.innerHTML = outs.length ? outs.map(x=>`
    <div class="daily-item">
      <div class="daily-dot out"></div>
      <span class="daily-dia">dia ${x.dia}</span>
      <span class="daily-desc">${x.desc}</span>
      <span class="daily-val red">− ${fmtBRL(x.valor)}</span>
      <button class="del-btn" onclick="delMov('${x.id}')">×</button>
    </div>`).join('') : '<div style="color:var(--muted);font-size:.82rem;padding:6px 0;font-style:italic">Nenhum gasto registrado.</div>';

  inEl.innerHTML = ins.length ? ins.map(x=>`
    <div class="daily-item">
      <div class="daily-dot in"></div>
      <span class="daily-dia">dia ${x.dia}</span>
      <span class="daily-desc">${x.desc}</span>
      <span class="daily-val green">+ ${fmtBRL(x.valor)}</span>
      <button class="del-btn" onclick="delMov('${x.id}')">×</button>
    </div>`).join('') : '<div style="color:var(--muted);font-size:.82rem;padding:6px 0;font-style:italic">Nenhum extra registrado.</div>';
}

// ═══════════════════════════════════════════════
// INVESTIMENTOS / CDI
// ═══════════════════════════════════════════════
// 105% do CDI: CDI ≈ 10.65% a.a. → 105% CDI ≈ 11.18% a.a.
const CDI_AA = 0.1065;
const PERCENTUAL_CDI = 1.05;
const TAXA_AA = CDI_AA * PERCENTUAL_CDI; // ≈ 11.18% a.a.
const TAXA_AM = Math.pow(1 + TAXA_AA, 1/12) - 1;

function openInvest() { openModal('mInvest'); document.getElementById('mi-desc').focus(); }

function saveInvest() {
  const desc  = document.getElementById('mi-desc').value.trim();
  const valor = parseFloat(document.getElementById('mi-valor').value) || 0;
  const dia   = document.getElementById('mi-dia').value || new Date().getDate();
  if(!desc || !valor) return alert('Preencha descrição e valor.');
  if(!state.aportes) state.aportes = [];
  state.aportes.push({ id:uid(), desc, valor, dia:String(dia), mes:state.activeMonth });
  closeModal('mInvest');
  document.getElementById('mi-desc').value='';
  document.getElementById('mi-valor').value='';
  renderInvestimentos();
  calcAll();
}

function delAporte(id) {
  state.aportes = (state.aportes||[]).filter(x=>x.id!==id);
  renderInvestimentos();
  calcAll();
}

function renderInvestimentos() {
  const aportes = state.aportes || [];
  const total = aportes.reduce((s,a)=>s+a.valor, 0);

  const saldoEl = document.getElementById('inv-saldo-total');
  if(!saldoEl) return;
  saldoEl.textContent = fmtBRL(total);
  setEl('b-inv-total', fmtBRL(total));

  // History list
  const histEl = document.getElementById('inv-hist-list');
  if(histEl) {
    histEl.innerHTML = aportes.length ? aportes.map(a=>`
      <div class="inv-hist-item">
        <div class="inv-hist-desc">${a.desc}</div>
        <div class="inv-hist-date">${a.mes} · dia ${a.dia}</div>
        <div class="inv-hist-val">+ ${fmtBRL(a.valor)}</div>
        <button class="del-btn" onclick="delAporte('${a.id}')">×</button>
      </div>`).join('') : '<div style="color:var(--muted);font-size:.82rem;font-style:italic;padding:8px 0">Nenhum aporte ainda.</div>';
  }

  // Projection
  const projEl = document.getElementById('inv-proj-rows');
  const noteEl = document.getElementById('inv-cdi-note');
  if(projEl && total > 0) {
    const periodos = [
      { label:'3 meses',   meses:3 },
      { label:'6 meses',   meses:6 },
      { label:'1 ano',     meses:12 },
      { label:'2 anos',    meses:24 },
      { label:'5 anos',    meses:60 },
    ];
    projEl.innerHTML = periodos.map(p => {
      const projetado = total * Math.pow(1+TAXA_AM, p.meses);
      const ganho = projetado - total;
      return `<div class="inv-proj-row">
        <span class="inv-proj-period">${p.label}</span>
        <div style="text-align:right">
          <div class="inv-proj-val">${fmtBRL(projetado)}</div>
          <div class="inv-proj-gain">+${fmtBRL(ganho)} rendimento</div>
        </div>
      </div>`;
    }).join('');
    if(noteEl) noteEl.textContent = `Taxa usada: 105% do CDI · CDI base: ${(CDI_AA*100).toFixed(2)}% a.a. · Rendimento bruto: ${(TAXA_AA*100).toFixed(2)}% a.a. (sem desconto de IR)`;
  } else if(projEl) {
    projEl.innerHTML = '<div style="color:var(--muted);font-size:.82rem;font-style:italic">Registre aportes para ver a projeção.</div>';
    if(noteEl) noteEl.textContent = '';
  }
}

// ═══════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close on overlay click
document.addEventListener('click', e => {
  if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

function openSalarioModal() { openModal('mSalario'); document.getElementById('ms-desc').focus(); }
function openDivFixaModal() { openModal('mDivFixa'); document.getElementById('mdf-desc').focus(); }

let _cartaoTarget = 'd08';
function openCartaoModal(key) {
  _cartaoTarget = key || 'd08';
  document.getElementById('mc-cartao').value = _cartaoTarget;
  document.getElementById('mc-mesInicio').value = state.activeMonth;
  openModal('mCartao');
  document.getElementById('mc-desc').focus();
}

function saveSalario() {
  const desc  = document.getElementById('ms-desc').value.trim();
  const valor = parseFloat(document.getElementById('ms-valor').value) || 0;
  const dia   = document.getElementById('ms-dia').value || '1';
  const obs   = document.getElementById('ms-obs').value.trim();
  if(!desc || !valor) return alert('Preencha descrição e valor.');
  const m = state.activeMonth;
  getSalarios(m).push({ id:uid(), desc, valor:valor.toFixed(2).replace('.',','), dia, obs });
  closeModal('mSalario');
  document.getElementById('ms-desc').value='';
  document.getElementById('ms-valor').value='';
  document.getElementById('ms-dia').value='';
  document.getElementById('ms-obs').value='';
  renderMonthContent(m);
}

function saveDivFixa() {
  const desc  = document.getElementById('mdf-desc').value.trim();
  const valor = parseFloat(document.getElementById('mdf-valor').value) || 0;
  const dia   = document.getElementById('mdf-dia').value || '1';
  const cat   = document.getElementById('mdf-cat').value;
  if(!desc || !valor) return alert('Preencha descrição e valor.');
  const m = state.activeMonth;
  getDivFixas(m).push({ id:uid(), desc, valor:valor.toFixed(2).replace('.',','), dia, cat, status:'pendente' });
  closeModal('mDivFixa');
  document.getElementById('mdf-desc').value='';
  document.getElementById('mdf-valor').value='';
  document.getElementById('mdf-dia').value='';
  renderMonthContent(m);
}

function saveCartao() {
  const desc        = document.getElementById('mc-desc').value.trim();
  const valor       = parseFloat(document.getElementById('mc-valor').value) || 0;
  const totalParc   = parseInt(document.getElementById('mc-parcelas').value) || 1;
  const cartao      = document.getElementById('mc-cartao').value;
  const mesInicio   = document.getElementById('mc-mesInicio').value.trim() || state.activeMonth;

  if(!desc || !valor) return alert('Preencha descrição e valor da parcela.');

  // Ensure all needed months exist
  for(let i=0; i<totalParc; i++) {
    const mes = addMonths(mesInicio, i);
    if(!state.months.includes(mes)) {
      state.months.push(mes);
      state.months.sort((a,b)=>monthIndex(b)-monthIndex(a));
    }
  }

  state.installments.push({
    id: uid(),
    desc,
    valorParcela: valor,
    totalParcelas: totalParc,
    cartao,
    mesInicio
  });

  closeModal('mCartao');
  document.getElementById('mc-desc').value='';
  document.getElementById('mc-valor').value='';

  renderMonthNav();
  renderMonthContent(state.activeMonth);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  loadState();
  document.getElementById('pageTitle').innerText = state.pageTitle;
  document.getElementById('pageSub').innerText   = state.pageSub;
  document.getElementById('pageEmoji').textContent = state.emoji || '💰';
  renderMonthNav();
  renderMonthContent(state.activeMonth);
}

init();
</script>
